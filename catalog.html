<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-MERCH — Каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .product-card { transition: all 0.3s; }
        .product-card:hover { transform: scale(1.05); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- НАВИГАЦИЯ (копия из index.html) -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center text-white text-2xl font-bold">K</div>
                    <span class="text-2xl font-bold tracking-wider">K-MERCH</span>
                </a>
                <div class="hidden md:flex items-center gap-8 text-lg">
                    <a href="index.html" class="hover:text-red-500 transition">Главная</a>
                    <a href="catalog.html" class="text-red-500 font-bold">Каталог</a>
                    <a href="about.html" class="hover:text-red-500 transition">О нас</a>
                    <a href="account.html" class="hover:text-red-500 transition">Личный кабинет</a>
                </div>
                <div class="flex items-center gap-6">
                    <a href="cart.html" class="relative">
                        <i class="fas fa-shopping-bag text-2xl"></i>
                        <span id="cart-count-nav2" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </a>
                    <a href="account.html"><i class="fas fa-user text-2xl"></i></a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="flex flex-col px-6 py-6 gap-6 text-lg">
                <a href="index.html">Главная</a>
                <a href="catalog.html" class="text-red-500 font-bold">Каталог</a>
                <a href="about.html">О нас</a>
                <a href="cart.html">Корзина</a>
                <a href="account.html">Личный кабинет</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-5xl font-bold text-center mb-4">Каталог мерча</h1>
        <p class="text-center text-xl text-gray-600 mb-12">Более 200 товаров из Кореи</p>

        <!-- ФИЛЬТРЫ (простые) -->
        <div class="flex flex-wrap gap-4 mb-10 justify-center">
            <button onclick="filterCategory('all')" class="category-btn active px-8 py-3 rounded-2xl bg-red-500 text-white">Все</button>
            <button onclick="filterCategory('bts')" class="category-btn px-8 py-3 rounded-2xl hover:bg-gray-200">BTS</button>
            <button onclick="filterCategory('blackpink')" class="category-btn px-8 py-3 rounded-2xl hover:bg-gray-200">BLACKPINK</button>
            <button onclick="filterCategory('straykids')" class="category-btn px-8 py-3 rounded-2xl hover:bg-gray-200">Stray Kids</button>
        </div>

        <div id="catalog-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Заполняется JS -->
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm opacity-70">© 2026 K-MERCH. Все права защищены.</p>
        </div>
    </footer>

    <script>
        const allProducts = [
            { id: 1, name: "Футболка BTS Dynamite", price: 1490, img: "https://basket-11.wbbasket.ru/vol1608/part160873/160873422/images/big/1.webp", category: "bts" },
            { id: 2, name: "Светящийся браслет BLACKPINK", price: 890, img: "https://basket-12.wbbasket.ru/vol1716/part171610/171610060/images/big/1.webp", category: "blackpink" },
            { id: 3, name: "Плакат Stray Kids", price: 590, img: "https://basket-23.wbbasket.ru/vol4131/part413163/413163066/images/big/1.webp", category: "straykids" },
            { id: 4, name: "Кружка TWICE", price: 790, img: "https://avatars.mds.yandex.net/i?id=06aa82e4be4c14f9926679451bb8736d60973fb6-9223337-images-thumbs&n=13", category: "bts" },
            { id: 5, name: "Набор стикеров K-pop", price: 390, img: "https://avatars.mds.yandex.net/i?id=e06e8abc50a10697cece21f5f9861701_l-4809712-images-thumbs&n=13", category: "blackpink" },
            { id: 6, name: "Худи NewJeans", price: 2290, img: "https://basket-15.wbbasket.ru/vol2263/part226355/226355127/images/big/1.webp", category: "straykids" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('#cart-count-nav, #cart-count-nav2').forEach(el => el.textContent = count);
        }
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity++; else cart.push({...product, quantity: 1});
            saveCart();
            alert(`✅ ${product.name} добавлен!`);
        }

        function renderCatalog(filteredProducts) {
            const container = document.getElementById('catalog-grid');
            container.innerHTML = filteredProducts.map(p => `
                <div class="product-card bg-white rounded-3xl overflow-hidden shadow">
                    <img src="${p.img}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="font-semibold text-lg mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-3xl font-bold">${p.price} ₽</span>
                            <button onclick="addToCart(${p.id})" class="bg-red-500 hover:bg-red-600 text-white px-8 py-4 rounded-2xl text-sm font-medium">В корзину</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'bg-red-500', 'text-white'));
            event.target.classList.add('active', 'bg-red-500', 'text-white');
            
            const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
            renderCatalog(filtered);
        }

        // Мобильное меню
        function initMobileMenu() {
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        }

        window.onload = () => {
            renderCatalog(allProducts);
            updateCartCount();
            initMobileMenu();
        };
    </script>
</body>
</html>
