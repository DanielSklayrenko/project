<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-MERCH — Корзина</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- НАВИГАЦИЯ -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center text-white text-2xl font-bold">K</div>
                    <span class="text-2xl font-bold tracking-wider">K-MERCH</span>
                </a>
                <div class="hidden md:flex items-center gap-8 text-lg">
                    <a href="index.html" class="hover:text-red-500">Главная</a>
                    <a href="catalog.html" class="hover:text-red-500">Каталог</a>
                    <a href="about.html" class="hover:text-red-500">О нас</a>
                    <a href="account.html" class="hover:text-red-500">Личный кабинет</a>
                </div>
                <div class="flex items-center gap-6">
                    <a href="cart.html" class="relative"><i class="fas fa-shopping-bag text-2xl"></i><span id="cart-count-nav" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center">0</span></a>
                    <a href="account.html"><i class="fas fa-user text-2xl"></i></a>
                </div>
                <button id="mobile-menu-btn" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t px-6 py-6 flex flex-col gap-6 text-lg">
            <a href="index.html">Главная</a><a href="catalog.html">Каталог</a><a href="about.html">О нас</a><a href="cart.html" class="text-red-500 font-bold">Корзина</a><a href="account.html">Личный кабинет</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-bold mb-10">Корзина</h1>
        <div id="cart-items" class="space-y-8"></div>

        <div class="mt-12 bg-white rounded-3xl p-10 shadow">
            <div class="flex justify-between text-3xl font-bold mb-8">
                <span>Итого:</span>
                <span id="total-price">0 ₽</span>
            </div>
            <button onclick="checkout()" 
                    class="w-full bg-red-500 hover:bg-red-600 text-white py-6 text-2xl font-bold rounded-3xl">Оформить заказ</button>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm opacity-70">© 2026 K-MERCH.</p>
        </div>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-2xl py-20 text-gray-500">Корзина пуста :(</p>`;
                document.getElementById('total-price').textContent = '0 ₽';
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="flex gap-8 bg-white p-8 rounded-3xl shadow items-center">
                        <img src="${item.img}" class="w-32 h-32 object-cover rounded-2xl">
                        <div class="flex-1">
                            <h3 class="text-2xl font-semibold">${item.name}</h3>
                            <p class="text-3xl font-bold mt-2">${item.price} ₽</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <button onclick="changeQuantity(${index}, -1)" class="w-12 h-12 border rounded-2xl text-3xl">-</button>
                            <span class="text-3xl font-medium w-12 text-center">${item.quantity}</span>
                            <button onclick="changeQuantity(${index}, 1)" class="w-12 h-12 border rounded-2xl text-3xl">+</button>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold">${itemTotal} ₽</p>
                            <button onclick="removeFromCart(${index})" class="mt-4 text-red-500 text-sm">Удалить</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
            document.getElementById('total-price').textContent = total + ' ₽';
        }

        function changeQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            saveCart();
            renderCart();
            updateCartCount();
        }
        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
            updateCartCount();
        }
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('#cart-count-nav, #cart-count-nav2').forEach(el => el.textContent = count);
        }
        function checkout() {
            if (cart.length === 0) return alert('Корзина пуста!');
            alert('🎉 Заказ оформлен! (демо — в реальной версии здесь будет форма оплаты)');
            cart = [];
            saveCart();
            renderCart();
            updateCartCount();
        }

        function initMobileMenu() {
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        }

        window.onload = () => {
            renderCart();
            updateCartCount();
            initMobileMenu();
        };
    </script>
</body>
</html>
